name: Deploy Backend API to Azure

on:
  push:
    branches: [ "main" ]
    paths:
      - 'code/be/**'

jobs:
  build-and-deploy:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 

    - name: Restore dependencies
      run: dotnet restore "code/be/School_Management.API/School_Management.API/School_Management.API.csproj"

    - name: Build and Publish
      run: dotnet publish "code/be/School_Management.API/School_Management.API/School_Management.API.csproj" -c Release -o ./publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'student-management-api'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish