name: Frontend CI/CD (Expo)

on:
  push:
    branches:
      - main
    paths:
      - 'code/fe/**'
  pull_request:
    branches:
      - main
    paths:
      - 'code/fe/**'

jobs:
  lint-and-typecheck:
    name: Code Quality Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: code/fe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: code/fe/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx,.ts,.tsx
        continue-on-error: true # Optional: adjust based on strictness

      - name: Type Check (TypeScript)
        run: npx tsc --noEmit
