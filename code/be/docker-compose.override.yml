version: '3.8'

services:
  api:
    build:
      context: ./School_Management.API
      dockerfile: Dockerfile
    container_name: school_management_api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - jaeger
      - prometheus
      - grafana
